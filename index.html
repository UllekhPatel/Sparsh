<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sparsh Utpal Patel | Cinematic Motion</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400;500;600;700;900&family=Noto+Sans+Devanagari:wght@800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="custom-cursor">
        <div class="line horizontal"></div>
        <div class="line vertical"></div>
    </div>

    <!-- WebGL Canvas Background -->
    <canvas id="webgl-canvas"></canvas>

    <div class="noise-overlay"></div>

    <nav class="top-bar">
        <div class="brand interactive">SUP.</div>
        <div class="nav-right">
            <span class="coord-hover interactive">Ahmedabad Base</span>
            <a href="#contact" class="btn-login interactive">CONTACT</a>
        </div>
    </nav>

    <div id="smooth-wrapper">
        <div id="smooth-content">
            
            <div class="scroll-pin-container">
                
                <!-- Phase 1 Content -->
                <div class="phase phase-1-descent">
                    <h1 class="massive-hero-text">SPARSH UTPAL PATEL</h1>
                </div>

                <!-- Phase 2 is purely visual (Anti Gravity) no direct DOM content is needed until Assembly -->

                <!-- Phase 3 Content -->
                <div class="phase phase-3-assembly">
                    <h2 class="kavach-shield-title">KAVACH<br>INFRACON</h2>
                </div>

                <!-- Phase 4 Content -->
                <div class="phase phase-4-laser">
                    <h1 class="sanskrit-engraved masking-text" id="laser-text">नैवं छिन्दन्ति शस्त्राणि</h1>
                    <p class="translation-fade">WEAPONS CANNOT CUT IT | ULTIMATE RESILIENCE</p>
                </div>
                
            </div>

            <!-- Scroll distance spacer extending timeline -->
            <div class="cinematic-spacer"></div>
            
        </div>
    </div>

    <!-- CDNs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
